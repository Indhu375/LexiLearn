<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexiLearn — Dashboard</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .dashboard-hero {
      padding: 40px 0;
    }
    .action-cards {
      margin-top: 40px;
    }
    .big-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 40px;
      font-size: 1.5rem;
      border-radius: var(--radius-lg);
    }
  </style>
</head>

<body>
  <div class="app-container">
    <header class="app-navbar">
      <div class="nav-brand">📊 Dashboard</div>
      <div class="nav-actions">
        <button class="btn btn-outline" onclick="window.location.href='index.html'">⬅ Home</button>
      </div>
    </header>

    <div class="surface dashboard-hero">
      <h1 class="text-primary mb-2">Explore Your Progress</h1>
      <p class="text-muted text-lg">Choose a view below to dive into detailed analytics or get guidance.</p>
      
      <div class="grid-2 action-cards">
        <button class="btn btn-primary big-btn" onclick="location.href='DViewAnalystF.html'">
          <span style="font-size: 2.5rem;">📈</span>
          View Analytics
        </button>
        <button class="btn btn-secondary big-btn" onclick="location.href='DParentsGuideF.html'">
          <span style="font-size: 2.5rem;">👨‍👩‍👧</span>
          Parents Guide
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, onSnapshot } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      onSnapshot(doc(db, "users", user.uid), (snap) => {
        if (!snap.exists()) return;
        const d = snap.data();
        console.log("Dashboard sync:", d);
      });
    });
  </script>
</body>
</html>
