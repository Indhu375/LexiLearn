<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexiLearn — Analytics</title>
  <link rel="stylesheet" href="theme.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .summary-card {
      text-align: center;
    }
    .summary-card .val { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
    .summary-card .lbl { color: var(--text-muted); font-size: 1.1rem; font-weight: 600; margin-top: 4px; }
    
    .chart-wrap { height: 260px; }
    
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 16px; }
    .cal-day { height: 24px; border-radius: 4px; background: var(--border-color); }
    .cal-day.l1 { background: rgba(108, 92, 231, 0.25); }
    .cal-day.l2 { background: rgba(108, 92, 231, 0.50); }
    .cal-day.l3 { background: rgba(108, 92, 231, 0.75); }
    .cal-day.l4 { background: rgba(108, 92, 231, 1.0); }
  </style>
</head>

<body>
  <div class="app-container">
    <header class="app-navbar">
        <div class="nav-brand">📈 Analytics Dashboard</div>
        <div class="nav-actions">
            <button class="btn btn-outline" onclick="window.location.href='index.html'">⬅ Home</button>
        </div>
    </header>

    <div class="mb-4">
      <p class="text-muted text-lg">Track your weekly progress and skills 🌟</p>
    </div>

    <div class="grid-4 mb-4">
      <div class="surface summary-card">
        <div class="val" id="statGames">0</div>
        <div class="lbl">Games This Week</div>
      </div>
      <div class="surface summary-card">
        <div class="val" id="statAccuracy">0%</div>
        <div class="lbl">Overall Accuracy</div>
      </div>
      <div class="surface summary-card">
        <div class="val" id="statStreak">0🔥</div>
        <div class="lbl">Day Streak</div>
      </div>
      <div class="surface summary-card">
        <div class="val" id="statPoints">0</div>
        <div class="lbl">Total Points</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="surface">
        <h3 class="mb-3 text-primary">📊 Weekly Activity</h3>
        <div class="chart-wrap"><canvas id="weeklyLine"></canvas></div>
      </div>
      <div class="surface">
        <h3 class="mb-3 text-primary">📈 Improvement Trend</h3>
        <div class="chart-wrap"><canvas id="trendLine"></canvas></div>
      </div>
      <div class="surface">
        <h3 class="mb-3 text-primary">🕸️ Skills Comparison</h3>
        <div class="chart-wrap"><canvas id="skills"></canvas></div>
      </div>
      <div class="surface">
        <h3 class="mb-3 text-primary">🎮 Games Breakdown</h3>
        <div class="chart-wrap"><canvas id="donut"></canvas></div>
      </div>
      <div class="surface" style="grid-column: 1 / -1;">
        <h3 class="mb-3 text-primary">📅 Activity Heatmap (Last 12 Weeks)</h3>
        <div class="calendar" id="calGrid"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, onSnapshot } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let weeklyChart, trendChart, skillsChart, donutChart;
    const fontFam = "system-ui, -apple-system, sans-serif";

    const chartDefaults = {
      plugins: { legend: { labels: { color: '#2d3436', font: { family: fontFam } } } },
      scales: {
        x: { ticks: { color: '#636e72', font: { family: fontFam } }, grid: { color: 'rgba(0,0,0,0.05)' } },
        y: { ticks: { color: '#636e72', font: { family: fontFam } }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    };

    function initCharts() {
      weeklyChart = new Chart(document.getElementById("weeklyLine"), {
        type: 'bar',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [{ label: 'Activity', data: [3, 5, 4, 8, 5, 6, 4], backgroundColor: '#a29bfe' }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: chartDefaults.plugins, scales: { x: chartDefaults.scales.x, y: { ...chartDefaults.scales.y, beginAtZero: true } } }
      });

      trendChart = new Chart(document.getElementById("trendLine"), {
        type: 'line',
        data: {
          labels: ['Wk 1', 'Wk 2', 'Wk 3', 'Wk 4', 'Wk 5', 'Wk 6'],
          datasets: [{ label: 'Accuracy %', data: [50, 55, 60, 65, 70, 75], borderColor: '#00b894', backgroundColor: 'rgba(0,184,148,0.1)', tension: 0.4, fill: true }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: chartDefaults.plugins, scales: chartDefaults.scales }
      });

      skillsChart = new Chart(document.getElementById("skills"), {
        type: 'radar',
        data: {
          labels: ['Phonics', 'Letter Seq', 'Vocabulary', 'Dominoes', 'Letter Maze', 'Memory'],
          datasets: [{ label: 'Progress', data: [70, 60, 80, 55, 65, 75], borderColor: '#fd79a8', backgroundColor: 'rgba(253,121,168,0.2)' }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, plugins: chartDefaults.plugins,
          scales: { r: { ticks: { backdropColor: 'transparent' }, min: 0, max: 100 } }
        }
      });

      donutChart = new Chart(document.getElementById("donut"), {
        type: 'doughnut',
        data: {
          labels: ['Completed', 'Remaining'],
          datasets: [{ data: [0, 100], backgroundColor: ['#6c5ce7', '#dfe6e9'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: chartDefaults.plugins }
      });
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      initCharts();

      onSnapshot(doc(db, "users", user.uid), (snap) => {
        if (!snap.exists()) return;
        const d = snap.data();

        document.getElementById("statGames").textContent = d.gamesPlayed || 0;
        document.getElementById("statAccuracy").textContent = (d.accuracy || 0) + "%";
        document.getElementById("statStreak").textContent = (d.streakDays || 0) + "🔥";
        document.getElementById("statPoints").textContent = d.totalPoints || 0;

        const acc = d.accuracy || 0;
        trendChart.data.datasets[0].data[5] = acc; trendChart.update();
        skillsChart.data.datasets[0].data = [ Math.min(100, (d.gamesPlayed||0)*5+40), Math.min(100, acc+10), Math.min(100, (d.totalPoints||0)/10+30), Math.min(100, (d.streakDays||0)*10+20), 65, 75 ];
        skillsChart.update();
        donutChart.data.datasets[0].data = [acc, 100 - acc]; donutChart.update();
      });
    });

    const grid = document.getElementById("calGrid");
    for (let i = 0; i < 84; i++) {
      const d = document.createElement("div"); const r = Math.random();
      d.className = "cal-day" + (r > 0.85 ? " l4" : r > 0.7 ? " l3" : r > 0.5 ? " l2" : r > 0.3 ? " l1" : "");
      grid.appendChild(d);
    }
  </script>
</body>
</html>
