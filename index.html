<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexiLearn — Learning Games Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #e0f7fa 0%, #ce93d8 100%);
      font-family: 'Comic Neue', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      color: #333;
    }

    /* Stars */
    .star {
      position: fixed;
      color: white;
      opacity: 0.6;
      animation: twinkle 3s infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.3);
      }
    }

    /* Glitter sparks */
    .glitter {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      width: 6px;
      height: 6px;
      animation: glitter-fall 4s linear infinite;
      z-index: 0;
    }

    @keyframes glitter-fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(105vh) rotate(720deg);
        opacity: 0;
      }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding: 24px 32px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(14px);
      border-radius: 32px;
      border: 3px solid #ffffff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .logo {
      font-size: 2.4em;
      font-weight: 800;
      color: #512da8;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
    }

    .top-buttons {
      display: flex;
      gap: 14px;
    }

    /* Tooltip system */
    .icon-btn {
      position: relative;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 1.5em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      color: white;
    }

    .icon-btn .tooltip {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75em;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
    }

    .icon-btn .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(0, 0, 0, 0.85);
    }

    .icon-btn:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(-5px);
    }

    .icon-btn:hover {
      transform: scale(1.12) rotate(5deg);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
    }

    .settings-btn {
      background: linear-gradient(45deg, #ff99cc, #ff6699);
    }

    .profile-btn {
      background: linear-gradient(45deg, #99ffcc, #33cc77);
    }

    .dashboard-btn {
      background: linear-gradient(45deg, #99ccff, #3399ff);
    }

    .logout-btn {
      background: linear-gradient(45deg, #ff6666, #ff3333);
    }

    /* Welcome */
    .welcome {
      text-align: center;
      margin-bottom: 50px;
    }

    .welcome h1 {
      font-size: 3.2em;
      color: #311b92;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
      font-weight: 800;
      margin-bottom: 12px;
    }

    .welcome p {
      font-size: 1.4em;
      color: #546e7a;
      font-weight: 700;
    }

    /* Main action buttons */
    .main-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-bottom: 60px;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }

    .action-btn {
      padding: 40px 28px;
      border: 4px solid #ffffff;
      border-radius: 36px;
      font-family: 'Comic Neue', sans-serif;
      font-size: 1.8em;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .play-btn {
      background: linear-gradient(135deg, #ff99cc, #ff5599);
      box-shadow: 0 10px 30px rgba(255, 85, 153, 0.45);
    }

    .daily-btn {
      background: linear-gradient(135deg, #ffee55, #ffaa00);
      box-shadow: 0 10px 30px rgba(255, 170, 0, 0.45);
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 10px 30px rgba(255, 170, 0, 0.45);
      }

      50% {
        box-shadow: 0 15px 45px rgba(255, 170, 0, 0.75), 0 0 60px rgba(255, 220, 0, 0.3);
      }
    }

    .action-btn:hover {
      transform: translateY(-6px) scale(1.03);
    }

    .action-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: rgba(255, 255, 255, 0.12);
      transform: rotate(45deg);
      transition: all 0.5s;
      opacity: 0;
    }

    .action-btn:hover::before {
      opacity: 1;
      animation: shine 0.5s ease;
    }

    @keyframes shine {
      0% {
        transform: translateX(-100%) rotate(45deg);
      }

      100% {
        transform: translateX(100%) rotate(45deg);
      }
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 24px;
      margin-bottom: 60px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 30px;
      text-align: center;
      border: 3px solid #ffffff;
      transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      animation: float 3s ease-in-out infinite;
    }

    .stat-card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.18);
    }

    .stat-card:nth-child(2) {
      animation-delay: 0.5s;
    }

    .stat-card:nth-child(3) {
      animation-delay: 1s;
    }

    .stat-card:nth-child(4) {
      animation-delay: 1.5s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .stat-icon {
      font-size: 2.4em;
      display: block;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 2em;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
      text-shadow: 0 0 12px currentColor;
    }

    .stat-label {
      color: #78909c;
      font-size: 1.1em;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 18px;
      }

      .main-actions {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .welcome h1 {
        font-size: 2.2em;
      }

      .action-btn {
        font-size: 1.4em;
        padding: 30px 20px;
      }
    }
  </style>

  <!-- Diagnostics Script -->
  <script>
    window.moduleLoaded = false;
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!window.moduleLoaded) {
          if (window.location.protocol === 'file:') {
            alert("🚨 Security Block: Your browser is blocking LexiLearn's features because it's being opened directly as a file. \n\nPlease use 'Live Server' in VS Code or host it on Vercel to use the app! ✨");
          } else {
            alert("🚨 Module Error: LexiLearn failed to load its core features. Please check if you've added this domain to your Firebase Authorized Domains list!");
          }
        }
      }, 5000);
    });

    // Global resource error listener
    window.addEventListener('error', (e) => {
      if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK' || e.target.tagName === 'IMG') {
        console.error('Resource failed to load:', e.target.src || e.target.href);
        // We only alert for scripts/links as they are critical
        if (e.target.tagName !== 'IMG') {
          alert("🚨 404 Error: Failed to load " + (e.target.src || e.target.href) + "\n\nPlease check your file paths!");
        }
      }
    }, true);
  </script>
</head>

<body>

  <!-- Stars -->
  <div class="star" style="top:8%;left:8%;font-size:22px;">✦</div>
  <div class="star" style="top:15%;right:15%;font-size:28px;animation-delay:0.5s;">✨</div>
  <div class="star" style="top:65%;left:12%;font-size:20px;animation-delay:1s;">⭐</div>
  <div class="star" style="top:78%;right:8%;font-size:24px;animation-delay:1.5s;">✦</div>
  <div class="star" style="top:38%;left:88%;font-size:22px;animation-delay:0.8s;">💫</div>
  <div class="star" style="top:55%;right:80%;font-size:18px;animation-delay:2s;">✨</div>
  <div class="star" style="top:28%;left:48%;font-size:16px;animation-delay:1.2s;">⭐</div>
  <div class="star" style="top:90%;left:42%;font-size:26px;animation-delay:0.3s;">✦</div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">🌟 LexiLearn</div>
      <div class="top-buttons">
        <button class="icon-btn dashboard-btn" id="dashBtn">
          📊<span class="tooltip">Dashboard</span>
        </button>
        <button class="icon-btn profile-btn" id="profBtn">
          👤<span class="tooltip">Profile</span>
        </button>
        <button class="icon-btn settings-btn" id="settBtn">
          ⚙️<span class="tooltip">Settings</span>
        </button>
        <button class="icon-btn logout-btn" id="logoutBtn">
          🚪<span class="tooltip">Logout</span>
        </button>
      </div>
    </header>

    <!-- Welcome -->
    <section class="welcome">
      <h1 id="greeting">Welcome Back! 🌟</h1>
      <p>Ready to learn and have fun? ✨</p>
    </section>

    <!-- Main Actions -->
    <section class="main-actions">
      <button class="action-btn play-btn" onclick="window.location.href='games/CombF.html'">
        🎯 PLAY GAMES
      </button>
      <button class="action-btn daily-btn" onclick="window.location.href='DailyCF.html'">
        🏆 DAILY CHALLENGE
      </button>
    </section>

    <!-- Stats -->
    <section class="stats">
      <div class="stat-card">
        <span class="stat-icon" style="color:#ff99cc;">🎯</span>
        <div class="stat-value" id="homeGamesPlayed" style="color:#ff99cc;">0</div>
        <div class="stat-label">Games Played</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon" style="color:#99ffcc;">⚡</span>
        <div class="stat-value" id="homeAccuracy" style="color:#99ffcc;">0%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon" style="color:#99ccff;">🏅</span>
        <div class="stat-value" id="homeStreakDays" style="color:#99ccff;">0</div>
        <div class="stat-label">Streak Days</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon" style="color:#ffff99;">⭐</span>
        <div class="stat-value" id="homeTotalPoints" style="color:#ffff99;">0</div>
        <div class="stat-label">Total Points</div>
      </div>
    </section>
  </div>

  <script type="module">
    window.moduleLoaded = true;
    // ✅ Import ONLY from shared config — NO API keys here
    import { auth, db, doc, onSnapshot } from "/firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let unsubscribeStats = null; // keep reference to unsubscribe on logout

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "login.html"; return; }

      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("nickname", user.displayName || user.email);

      // Greeting
      const hour = new Date().getHours();
      const name = user.displayName || user.email.split("@")[0] || "Explorer";
      const greeting = document.getElementById("greeting");
      if (hour < 12) greeting.textContent = `Good Morning, ${name}! 🌅`;
      else if (hour < 17) greeting.textContent = `Good Afternoon, ${name}! ☀️`;
      else greeting.textContent = `Good Evening, ${name}! 🌙`;

      // ── Real-time stats listener ─────────────────────────────────────────
      if (unsubscribeStats) unsubscribeStats(); // clean up previous listener
      unsubscribeStats = onSnapshot(doc(db, "users", user.uid), (snap) => {
        if (!snap.exists()) return;
        const d = snap.data();
        animateCount("homeGamesPlayed", d.gamesPlayed || 0);
        animateCount("homeStreakDays", d.streakDays || 0);
        animateCount("homeTotalPoints", d.totalPoints || 0);
        document.getElementById("homeAccuracy").textContent = (d.accuracy || 0) + "%";
      }, (err) => console.warn("Stats listener error:", err));
    });

    // Logout
    window.logoutUser = async () => {
      try {
        if (unsubscribeStats) unsubscribeStats();
        localStorage.setItem("justLoggedOut", "true");
        await signOut(auth);
      } catch (err) {
        console.warn("Sign out error (proceeding regardless):", err);
      }
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("nickname");
      localStorage.removeItem("uid");
      window.location.href = "login.html";
    };

    document.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("logoutBtn");
      if (btn) btn.addEventListener('click', () => window.logoutUser());

      const dash = document.getElementById("dashBtn");
      if (dash) dash.addEventListener('click', () => window.location.href = 'Dashboard.html');

      const prof = document.getElementById("profBtn");
      if (prof) prof.addEventListener('click', () => window.location.href = 'ProfileF.html');

      const sett = document.getElementById("settBtn");
      if (sett) sett.addEventListener('click', () => window.location.href = 'SettingF.html');
    });

    function animateCount(id, target) {
      const el = document.getElementById(id);
      if (!el) return;
      let cur = parseInt(el.textContent) || 0;
      if (cur === target) return;

      const step = Math.max(1, Math.round(Math.abs(target - cur) / 30));
      const timer = setInterval(() => {
        if (cur < target) cur = Math.min(cur + step, target);
        else cur = Math.max(cur - step, target);

        el.textContent = (id === "homeAccuracy") ? cur + "%" : cur;
        if (cur === target) clearInterval(timer);
      }, 30);
    }
  </script>

  <script>
    // Extra sparkle stars
    const syms = ["✦", "✨", "⭐", "💫", "🌟"];
    for (let i = 0; i < 14; i++) {
      const s = document.createElement("div");
      s.className = "star";
      s.textContent = syms[Math.floor(Math.random() * syms.length)];
      s.style.top = Math.random() * 100 + "%";
      s.style.left = Math.random() * 100 + "%";
      s.style.fontSize = (Math.random() * 10 + 14) + "px";
      s.style.animationDelay = Math.random() * 3 + "s";
      document.body.appendChild(s);
    }

    // Glitter
    const colors = ["#ff99ff", "#00ffff", "#ffff00", "#ff66cc", "#99ffcc"];
    for (let i = 0; i < 20; i++) {
      const g = document.createElement("div");
      g.className = "glitter";
      g.style.left = Math.random() * 100 + "%";
      g.style.background = colors[Math.floor(Math.random() * colors.length)];
      g.style.animationDelay = Math.random() * 4 + "s";
      g.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(g);
    }

    // Touch tooltips
    document.querySelectorAll(".icon-btn").forEach(btn => {
      btn.addEventListener("touchstart", () => {
        const tip = btn.querySelector(".tooltip");
        if (tip) { tip.style.opacity = "1"; setTimeout(() => tip.style.opacity = "0", 1500); }
      });
    });
  </script>
</body>

</html>
