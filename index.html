<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexiLearn — Learning Games Home</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    /* Specific Home Page Overrides */
    .hero-section {
      padding: 60px 0;
      max-width: 600px;
    }
    
    .hero-section h1 {
      font-size: 3rem;
      color: var(--primary);
    }
    
    .hero-section p {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .main-actions {
      display: flex;
      gap: 20px;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }

    .main-actions .btn {
      font-size: 1.25rem;
      padding: 16px 32px;
    }

    .stats-container {
      margin-bottom: 60px;
    }
    
    .stats-header {
      margin-bottom: 24px;
      font-size: 1.5rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 8px;
    }

    .nav-actions .btn-icon {
      font-size: 1.5rem;
    }
  </style>

  <!-- Diagnostics Script -->
  <script>
    window.moduleLoaded = false;
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!window.moduleLoaded) {
          if (window.location.protocol === 'file:') {
            alert("🚨 Security Block: Your browser is blocking LexiLearn's features because it's being opened directly as a file. \n\nPlease use 'Live Server' in VS Code or host it on Vercel to use the app! ✨");
          } else {
            alert("🚨 Module Error: LexiLearn failed to load its core features. Please check if you've added this domain to your Firebase Authorized Domains list!");
          }
        }
      }, 5000);
    });

    window.addEventListener('error', (e) => {
      const tag = e.target.tagName;
      if (tag === 'SCRIPT' || tag === 'LINK' || tag === 'IMG') {
        const url = e.target.src || e.target.href;
        console.error('Resource failed to load:', url || 'Inline Script/Module');

        if (tag === 'SCRIPT' && !url) {
          alert("🚨 Module Error: An internal script failed to load its dependencies. \n\nPlease ensure all files are uploaded and paths are correct!");
          return;
        }

        if (tag !== 'IMG') {
          alert("🚨 404 Error: Failed to load " + (url || "a resource") + " [" + tag + "]\n\nPlease check your file paths!");
        }
      }
    }, true);
  </script>
</head>

<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-navbar">
      <a href="#" class="nav-brand">🌟 LexiLearn</a>
      <div class="nav-actions">
        <button class="btn-icon" id="dashBtn" title="Dashboard">📊</button>
        <button class="btn-icon" id="profBtn" title="Profile">👤</button>
        <button class="btn-icon" id="settBtn" title="Settings">⚙️</button>
        <button class="btn-icon" id="logoutBtn" title="Logout">🚪</button>
      </div>
    </header>

    <!-- Welcome -->
    <section class="hero-section">
      <h1 id="greeting">Welcome Back! 🌟</h1>
      <p>Ready to learn and have fun? Pick an activity to get started!</p>
      
      <!-- Main Actions -->
      <div class="main-actions">
        <button class="btn btn-primary" onclick="window.location.href='games/CombF.html'">
          🎯 PLAY GAMES
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='DailyCF.html'">
          🏆 DAILY CHALLENGE
        </button>
      </div>
    </section>

    <!-- Stats -->
    <section class="stats-container">
      <h2 class="stats-header">Your Progress</h2>
      <div class="grid-4">
        <div class="surface stat-card text-center">
          <div class="icon">🎯</div>
          <div class="value" id="homeGamesPlayed">0</div>
          <div class="label">Games Played</div>
        </div>
        <div class="surface stat-card text-center">
          <div class="icon">⚡</div>
          <div class="value" id="homeAccuracy">0%</div>
          <div class="label">Accuracy</div>
        </div>
        <div class="surface stat-card text-center">
          <div class="icon">🏅</div>
          <div class="value" id="homeStreakDays">0</div>
          <div class="label">Streak Days</div>
        </div>
        <div class="surface stat-card text-center">
          <div class="icon">⭐</div>
          <div class="value" id="homeTotalPoints">0</div>
          <div class="label">Total Points</div>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    window.moduleLoaded = true;
    import { auth, db, doc, onSnapshot } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let unsubscribeStats = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "login.html"; return; }

      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("nickname", user.displayName || user.email);

      // Greeting
      const hour = new Date().getHours();
      const name = user.displayName || user.email.split("@")[0] || "Explorer";
      const greeting = document.getElementById("greeting");
      if (hour < 12) greeting.textContent = `Good Morning, ${name}! 🌅`;
      else if (hour < 17) greeting.textContent = `Good Afternoon, ${name}! ☀️`;
      else greeting.textContent = `Good Evening, ${name}! 🌙`;

      // Real-time stats listener
      if (unsubscribeStats) unsubscribeStats();
      unsubscribeStats = onSnapshot(doc(db, "users", user.uid), (snap) => {
        if (!snap.exists()) return;
        const d = snap.data();
        animateCount("homeGamesPlayed", d.gamesPlayed || 0);
        animateCount("homeStreakDays", d.streakDays || 0);
        animateCount("homeTotalPoints", d.totalPoints || 0);
        document.getElementById("homeAccuracy").textContent = (d.accuracy || 0) + "%";
      }, (err) => console.warn("Stats listener error:", err));
    });

    // Logout
    window.logoutUser = async () => {
      try {
        if (unsubscribeStats) unsubscribeStats();
        localStorage.setItem("justLoggedOut", "true");
        await signOut(auth);
      } catch (err) {
        console.warn("Sign out error:", err);
      }
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("nickname");
      localStorage.removeItem("uid");
      window.location.href = "login.html";
    };

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("logoutBtn")?.addEventListener('click', () => window.logoutUser());
      document.getElementById("dashBtn")?.addEventListener('click', () => window.location.href = 'Dashboard.html');
      document.getElementById("profBtn")?.addEventListener('click', () => window.location.href = 'ProfileF.html');
      document.getElementById("settBtn")?.addEventListener('click', () => window.location.href = 'SettingF.html');
    });

    function animateCount(id, target) {
      const el = document.getElementById(id);
      if (!el) return;
      let cur = parseInt(el.textContent) || 0;
      if (cur === target) return;

      const step = Math.max(1, Math.round(Math.abs(target - cur) / 30));
      const timer = setInterval(() => {
        if (cur < target) cur = Math.min(cur + step, target);
        else cur = Math.max(cur - step, target);

        el.textContent = (id === "homeAccuracy") ? cur + "%" : cur;
        if (cur === target) clearInterval(timer);
      }, 30);
    }
  </script>
</body>
</html>
