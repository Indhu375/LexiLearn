<!-- Shadow Matching / Number & Letter Quest -->
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Number &amp; Letter Quest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

        :root {
            --cyan: #00e6ff;
            --pink: #cc3399;
            --wrong: #ff4d4d;
            --hint: #ffff99;
        }

        * {
            box-sizing: border-box;
            font-family: 'Comic Neue', Arial, sans-serif;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            color: #fff;
            background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .app {
            max-width: 960px;
            margin: 0 auto;
            padding: 18px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            margin: 12px 0;
            font-size: 36px;
            color: var(--pink);
            text-shadow: 2px 2px 8px var(--cyan)
        }

        #status {
            min-height: 24px;
            margin-bottom: 12px;
            font-size: 20px
        }

        #choiceScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 50vh;
            gap: 20px;
        }

        .choiceBtn {
            padding: 15px 30px;
            font-size: 24px;
            border: none;
            border-radius: 12px;
            background: var(--pink);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        .choiceBtn:hover {
            background: var(--cyan);
            color: #000;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 12px;
            max-width: 480px;
            margin: 0 auto;
            display: none;
        }

        .slot {
            position: relative;
            height: 100px;
            border-radius: 12px;
            background: #2c2c54;
            border: 2px dashed rgba(255, 51, 153, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
            user-select: none;
            overflow: hidden;
            transition: transform .15s, border-color .15s;
        }

        .slot::before {
            content: attr(data-answer);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
            font-size: 38px;
            color: rgba(255, 255, 255, 0.35);
            pointer-events: none;
        }

        .slot.filled {
            border: 2px solid var(--cyan);
            color: var(--pink);
            text-shadow: 0 0 12px var(--pink);
            transform: scale(1.05);
        }

        .slot.wrong {
            animation: shake 0.3s;
            border-color: var(--wrong);
        }

        .slot.hint {
            border: 3px solid var(--hint);
            box-shadow: 0 0 10px var(--hint);
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-6px);
            }

            100% {
                transform: translateX(0);
            }
        }

        #pool {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            padding: 18px;
            margin-top: 20px;
            display: none;
        }

        .tile {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: #111;
            border: 2px solid var(--cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 32px;
            color: var(--pink);
            text-shadow: 0 0 12px var(--pink);
            cursor: grab;
            user-select: none;
            touch-action: none;
            transition: transform .1s, opacity .12s;
        }

        .tile:active {
            cursor: grabbing;
            transform: scale(.98);
        }

        .tile.dragging {
            opacity: .6;
        }

        #message {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 28px;
            color: #fff;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: opacity .3s;
        }

        #message.show {
            visibility: visible;
            opacity: 1
        }

        #message button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 20px;
            background: var(--cyan);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        #volumeBtn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--cyan);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
            z-index: 200;
        }

        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 10px 18px;
            font-size: 1em;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.25s;
            font-family: 'Comic Neue', sans-serif;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateX(-3px);
        }

        #hintBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--pink);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
            z-index: 200;
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>✨ Number &amp; Letter Quest ✨</h1>
        <button class="back-btn" onclick="window.location.href='./CombF.html'">⬅ Back</button>
        <button id="volumeBtn">🔊</button>
        <button id="hintBtn">💡 Hint</button>
        <div id="choiceScreen">
            <button class="choiceBtn" data-type="letters">Letters</button>
            <button class="choiceBtn" data-type="numbers">Numbers</button>
        </div>
        <div id="status">Select Letters or Numbers to Start</div>
        <div id="grid"></div>
        <div id="pool"></div>
    </div>
    <div id="message">
        <div id="msgText"></div>
        <button id="nextBtn">Next</button>
    </div>
    <script>
        let type = "letters";
        const ALPH = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
        const NUMS = "1234567890".split('');
        const gridEl = document.getElementById('grid');
        const poolEl = document.getElementById('pool');
        const statusEl = document.getElementById('status');
        const msgBox = document.getElementById('message');
        const msgText = document.getElementById('msgText');
        const nextBtn = document.getElementById('nextBtn');
        const choiceScreen = document.getElementById('choiceScreen');
        const volumeBtn = document.getElementById('volumeBtn');
        const hintBtn = document.getElementById('hintBtn');
        let soundOn = true, level = 0, currentHintIndex = 0;
        const levels = [{ name: "Easy", count: 4 }, { name: "Medium", count: 6 }, { name: "Hard", count: 8 }];

        function speak(text) { if (!soundOn) return; const u = new SpeechSynthesisUtterance(text); u.rate = 0.9; speechSynthesis.speak(u); }
        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

        volumeBtn.addEventListener("click", () => { soundOn = !soundOn; volumeBtn.textContent = soundOn ? "🔊" : "🔇"; });

        document.querySelectorAll('.choiceBtn').forEach(btn => {
            btn.addEventListener('click', () => { type = btn.dataset.type; choiceScreen.style.display = 'none'; level = 0; gridEl.style.display = 'grid'; poolEl.style.display = 'flex'; createRound(); });
        });

        function createRound() {
            gridEl.innerHTML = ''; poolEl.innerHTML = ''; currentHintIndex = 0;
            const { name, count } = levels[level];
            const items = shuffle((type === "letters" ? ALPH : NUMS)).slice(0, count);
            statusEl.textContent = `${name} Level — Place ${count} ${type === "letters" ? "letters" : "numbers"}`;
            items.forEach(L => {
                const slot = document.createElement('div'); slot.className = 'slot'; slot.dataset.answer = L;
                slot.addEventListener('dragover', e => e.preventDefault());
                slot.addEventListener('drop', e => {
                    e.preventDefault(); const letter = e.dataTransfer.getData('text');
                    if (letter === L) { slot.classList.add('filled'); slot.textContent = L; document.querySelector(`.tile[data-letter="${letter}"]`)?.remove(); speak(letter); checkWin(); }
                    else { slot.classList.add('wrong'); speak("Try again"); setTimeout(() => slot.classList.remove('wrong'), 300); }
                });
                gridEl.appendChild(slot);
            });
            shuffle([...items]).forEach(L => {
                const tile = document.createElement('div'); tile.className = 'tile'; tile.textContent = L; tile.dataset.letter = L; tile.draggable = true;
                tile.addEventListener('click', () => speak(L));
                tile.addEventListener('dragstart', e => e.dataTransfer.setData('text', L));
                poolEl.appendChild(tile);
            });
        }

        function checkWin() {
            const allSlots = [...document.querySelectorAll('.slot')];
            if (allSlots.every(s => s.classList.contains('filled'))) {
                if (level < 2) { showMessage(`🎉 Great job! You finished ${levels[level].name} Level!`); speak(`Great job! You finished ${levels[level].name} level`); }
                else { showMessage(`🏆 Amazing! You completed all levels!`); speak("Amazing! You completed all levels!"); }
            }
        }

        function showMessage(txt) { msgText.textContent = txt; msgBox.classList.add('show'); nextBtn.textContent = (level < 2) ? "Next Level" : "Restart"; }

        nextBtn.addEventListener('click', () => { msgBox.classList.remove('show'); if (level < 2) { level++; createRound(); } else { level = 0; createRound(); } });

        hintBtn.addEventListener('click', () => {
            const slots = [...document.querySelectorAll('.slot')].filter(s => !s.classList.contains('filled'));
            if (currentHintIndex < slots.length) { const slot = slots[currentHintIndex]; slot.classList.add('hint'); setTimeout(() => slot.classList.remove('hint'), 1500); currentHintIndex++; }
        });
    </script>
</body>

</html>
