<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>LexiLearn — I-Spy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../theme.css">
    <style>
        .letter-display {
            font-size: 6rem;
            font-weight: 900;
            color: var(--primary);
            margin: 20px 0;
            text-align: center;
        }

        .timer {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--text-muted);
            text-align: center;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .image-card {
            background: var(--surface-color);
            border: 4px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            box-shadow: 0 12px 25px rgba(108, 92, 231, 0.2);
        }

        .image-card img {
            width: 100%;
            height: 160px;
            object-fit: contain;
        }

        .image-card.correct {
            border-color: var(--success) !important;
            background: rgba(0, 184, 148, 0.1);
            transform: scale(1.05);
        }

        .image-card.wrong {
            border-color: var(--danger) !important;
            background: rgba(255, 118, 117, 0.1);
            opacity: 0.6;
            transform: scale(0.95);
        }

        .feedback {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            height: 3rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="game-layout">
        <header class="game-header">
            <h1 class="nav-brand">🔍 I-Spy Quest</h1>
            <div class="nav-actions">
                <button class="btn btn-outline" onclick="window.location.href='./CombF.html'">⬅ Back</button>
                <button class="btn btn-danger" onclick="window.location.href='../index.html'">🏁 Finish</button>
            </div>
        </header>

        <div class="app-container">
            <h2 class="text-primary text-center mb-2" style="font-size: 2.5rem;">I spy something that starts with...</h2>

            <div class="letter-display" id="letterDisplay">A</div>
            <div class="timer" id="timer">⏱️ Time: 20s</div>

            <div class="feedback" id="feedback"></div>
            <div class="image-grid" id="imageGrid"></div>

            <div class="text-center">
                <button class="btn btn-primary" id="nextBtn" style="display: none; margin: 0 auto; font-size: 1.5rem; padding: 16px 48px;" onclick="nextRound()">Next Round ⏭️</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "../firebase-config.js";
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const imageBank = {
            A: ["apple.png", "ant.png", "aeroplane.png"],
            B: ["ball.png", "bat.png", "banana.png"],
            C: ["cat.png", "car.png", "cup.png"],
            D: ["dog.png", "donkey.png", "dolphin.png"],
            E: ["elephant.png", "eagle.png", "egg.png"],
            F: ["fan.png", "fish.png", "frog.png"],
            G: ["grapes.png", "goat.png", "girafee.png"],
            H: ["hat.png", "hen.png", "horse.png"],
            I: ["igloo.png", "icecream.png", "ice.png"],
            J: ["jeans.png", "jeep.png", "jug.png"],
            K: ["kiwi.png", "key.png", "kettle.png"],
            L: ["lamb.png", "lion.png", "lotus.png"],
            M: ["mango.png", "monkey.png", "mushroom.png"],
            N: ["nurse.png", "nest.png", "nails.png"],
            O: ["onion.png", "orange.png", "ostrich.png"],
            P: ["pencil.png", "penguin.png", "pumpkin.png"],
            Q: ["queen.png", "queue.png", "ques_mark.png"],
            R: ["rabbit.png", "radio.png", "rainbow.png"],
            S: ["shoe.png", "ship.png", "sheep.png"],
            T: ["tiger.png", "tomato.png", "turtle.png"],
            U: ["unicorn.png", "umbrella.png", "up.png"],
            V: ["vase.png", "violin.png", "vowels.png"],
            W: ["wheel.png", "watermelon.png", "watch.png"],
            X: ["xerox.png", "xmase.png", "xylophone.png"],
            Y: ["yoyo.png", "yak.png", "yarn.png"],
            Z: ["zebra.png", "zipper.png", "zero.png"]
        };

        let currentLetter = "";
        let timeLeft = 20;
        let interval;
        let roundStart;
        let isGameOver = false;

        function startTimer() {
            timeLeft = 20;
            roundStart = Date.now();
            updateTimerDisplay();

            interval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    endRound(false);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById("timer").innerText = `⏱️ Time: ${timeLeft}s`;
        }

        function getCorrectImage(letter) {
            const imgs = imageBank[letter];
            return `../assests/images/${letter}/${imgs[Math.floor(Math.random() * imgs.length)]}`;
        }

        function getWrongImages(letter) {
            const otherLetters = Object.keys(imageBank).filter(l => l !== letter);
            let arr = [];
            while (arr.length < 3) {
                const l = otherLetters[Math.floor(Math.random() * otherLetters.length)];
                const img = imageBank[l][Math.floor(Math.random() * imageBank[l].length)];
                const path = `../assests/images/${l}/${img}`;
                if (!arr.includes(path)) arr.push(path);
            }
            return arr;
        }

        function shuffle(arr) {
            return arr.sort(() => Math.random() - 0.5);
        }

        function renderRound() {
            isGameOver = false;
            const grid = document.getElementById("imageGrid");
            const letterEl = document.getElementById("letterDisplay");
            const feedback = document.getElementById("feedback");
            const nextBtn = document.getElementById("nextBtn");

            feedback.innerText = "";
            grid.innerHTML = "";
            nextBtn.style.display = "none";

            currentLetter = Object.keys(imageBank)[Math.floor(Math.random() * 26)];
            letterEl.innerText = currentLetter;

            const correctSrc = getCorrectImage(currentLetter);
            const images = shuffle([correctSrc, ...getWrongImages(currentLetter)]);

            images.forEach(src => {
                const card = document.createElement("div");
                card.className = "image-card";
                const img = document.createElement("img");
                img.src = src;

                card.onclick = () => {
                    if (isGameOver) return;
                    clearInterval(interval);
                    const isCorrect = src === correctSrc;
                    card.classList.add(isCorrect ? "correct" : "wrong");
                    endRound(isCorrect);
                };

                card.appendChild(img);
                grid.appendChild(card);
            });

            startTimer();
        }

        async function endRound(correct) {
            isGameOver = true;
            const feedback = document.getElementById("feedback");
            const nextBtn = document.getElementById("nextBtn");

            feedback.innerText = correct ? "🎉 Correct! Great job!" : "❌ Oops! Try next one.";
            feedback.style.color = correct ? "var(--success)" : "var(--danger)";
            nextBtn.style.display = "block";

            const user = auth.currentUser;
            if (!user) return;

            try {
                await updateDoc(doc(db, "users", user.uid), {
                    "totalPoints": increment(correct ? 10 : 0),
                    "gamesPlayed": increment(1)
                });
            } catch (err) {
                console.error("Firebase update failed:", err);
            }
        }

        window.nextRound = renderRound;
        renderRound();
    </script>
</body>
</html>
