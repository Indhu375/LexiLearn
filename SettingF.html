<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexiLearn — Settings</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 2px solid var(--border-color);
    }
    .settings-row:last-child {
      border-bottom: none;
    }
    .row-label {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text-main);
    }

    /* Modern Toggle */
    .toggle-wrap { position: relative; width: 60px; height: 32px; display: inline-block; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background-color: var(--border-color); transition: .3s; border-radius: 34px;
    }
    .toggle-slider:before {
      position: absolute; content: ""; height: 24px; width: 24px; left: 4px; bottom: 4px;
      background-color: white; transition: .3s; border-radius: 50%;
    }
    input:checked + .toggle-slider { background-color: var(--primary); }
    input:checked + .toggle-slider:before { transform: translateX(28px); }

    input[type="range"] { accent-color: var(--primary); cursor: pointer; }
    
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text-main); color: white; padding: 16px 24px;
      border-radius: var(--radius-md); font-weight: 600; opacity: 0;
      transition: all 0.3s; z-index: 9999; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <div class="app-container" style="max-width: 600px;">
    <header class="app-navbar">
        <div class="nav-brand">⚙️ Settings</div>
        <div class="nav-actions">
            <button class="btn btn-outline" onclick="window.location.href='index.html'">⬅ Home</button>
        </div>
    </header>

    <div id="toast"></div>

    <div class="surface mb-4">
      <h3 class="text-primary mb-2">🧩 Accessibility</h3>
      <div class="settings-row">
        <span class="row-label">Font Size</span>
        <select id="fontSizeSelect" class="input-base" style="width: 150px;">
          <option value="14px">Small</option>
          <option value="16px" selected>Medium</option>
          <option value="20px">Large</option>
        </select>
      </div>

      <h3 class="text-primary mt-4 mb-2">🔊 Sound</h3>
      <div class="settings-row">
        <span class="row-label">Volume</span>
        <input type="range" id="volumeRange" min="0" max="100" value="70">
      </div>
      <div class="settings-row">
        <span class="row-label">Sound Effects</span>
        <label class="toggle-wrap">
          <input type="checkbox" id="soundToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <h3 class="text-primary mt-4 mb-2">🔒 Account</h3>
      <div class="settings-row">
        <span class="row-label">Change Password</span>
        <button class="btn btn-secondary" id="changePwBtn">Send Link</button>
      </div>
      <div class="settings-row">
        <span class="row-label">Logged in as</span>
        <span id="userEmailDisplay" class="text-muted" style="font-weight:600;"></span>
      </div>
      <div class="settings-row" style="padding-bottom: 0;">
        <span class="row-label">Sign Out</span>
        <button class="btn btn-danger" id="logoutBtn">Logout 🚪</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg; el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2500);
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      document.getElementById("userEmailDisplay").textContent = user.email || "";
    });

    window.logoutUser = async () => {
      try { localStorage.setItem("justLoggedOut", "true"); await signOut(auth); } catch (err) {}
      localStorage.clear(); window.location.href = "login.html";
    };

    document.getElementById("logoutBtn").addEventListener('click', () => window.logoutUser());

    document.getElementById("changePwBtn").addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user?.email) return;
      await sendPasswordResetEmail(auth, user.email);
      toast("✅ Password reset email sent to " + user.email);
    });

    document.getElementById("fontSizeSelect").addEventListener("change", e => {
      document.body.style.fontSize = e.target.value;
    });
  </script>
</body>
</html>
