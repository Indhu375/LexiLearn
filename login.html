<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexiLearn — Sign In</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body {
      background: var(--bg-color);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      padding: 40px;
    }

    .logo-text {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      background: var(--surface-color);
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
    }
    .google-btn:hover {
      background: var(--bg-color);
      border-color: var(--primary);
    }
    .google-btn img {
      width: 20px;
      height: 20px;
    }

    .toggle-link {
       display: inline-block;
       width: 100%;
       text-align: center;
       margin-top: 24px;
       font-weight: 600;
       color: var(--primary);
       cursor: pointer;
       text-decoration: underline;
    }
    .toggle-link:hover {
       color: var(--primary-hover);
    }

    .info-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--primary);
      color: white;
      text-align: center;
      padding: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 1000;
    }

    #loader {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.9);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: var(--primary);
      font-weight: 800;
      font-size: 1.5rem;
    }
    #loader.show { display: flex; }

    #signupFields { display: none; }
  </style>
</head>

<body>
  <div id="loader">Loading LexiLearn...</div>

  <div class="surface auth-card">
    <div class="logo-text">🌟 LexiLearn</div>
    <div class="subtitle">Fun learning for every child ✨</div>

    <h2 id="formTitle" class="text-center mb-4">Sign In</h2>

    <div id="signinFields" class="input-group">
      <input type="email" class="input-base" id="emailSignin" placeholder="Email Address" autocomplete="email">
    </div>

    <div id="signupFields">
      <div class="input-group"><input type="text" class="input-base" id="firstName" placeholder="First Name"></div>
      <div class="input-group"><input type="text" class="input-base" id="lastName" placeholder="Last Name"></div>
      <div class="input-group"><input type="number" class="input-base" id="ageInput" placeholder="Age"></div>
      <div class="input-group"><input type="email" class="input-base" id="emailSignup" placeholder="Email Address" autocomplete="email"></div>
      <div class="input-group"><input type="text" class="input-base" id="nickname" placeholder="Nickname"></div>
    </div>

    <div class="input-group">
      <input type="password" class="input-base" id="password" placeholder="Password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" style="width: 100%; padding: 16px;" id="authBtn">Sign In</button>

    <button class="google-btn" id="googleBtn">
      <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google">
      Continue with Google
    </button>

    <span class="toggle-link" id="toggleForm">Don't have an account? Sign Up</span>
    <span class="toggle-link" id="resendVerification" style="display:none; margin-top: 12px;">Resend Verification Email</span>
  </div>

  <div class="info-bar">⚠️ Designed for children — Parental supervision recommended ⚠️</div>

  <script type="module">
    window.moduleLoaded = true;
    import { auth, db, doc, getDoc, setDoc } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      updateProfile,
      onAuthStateChanged,
      GoogleAuthProvider,
      signInWithPopup,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loader = document.getElementById("loader");
    const authBtn = document.getElementById("authBtn");
    const googleBtn = document.getElementById("googleBtn");
    const toggleForm = document.getElementById("toggleForm");
    const formTitle = document.getElementById("formTitle");
    const signinFields = document.getElementById("signinFields");
    const signupFields = document.getElementById("signupFields");
    const resendBtn = document.getElementById("resendVerification");
    let isSignIn = true;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        if (localStorage.getItem("justLoggedOut") === "true") return;
        loader.classList.add("show");
        await redirectAfterLogin(user);
      }
    });

    window.addEventListener("mousedown", () => localStorage.removeItem("justLoggedOut"));
    window.addEventListener("keydown", () => localStorage.removeItem("justLoggedOut"));

    async function redirectAfterLogin(user) {
      if (!user.emailVerified && user.providerData.some(p => p.providerId === 'password')) {
        loader.classList.remove("show");
        alert("Please verify your email address before logging in! Check your inbox and spam folder.");
        resendBtn.style.display = "inline-block";
        return;
      }
      resendBtn.style.display = "none";
      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("nickname", user.displayName || user.email);
      localStorage.setItem("uid", user.uid);
      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists() && snap.data().screeningComplete) window.location.href = "index.html";
        else window.location.href = "ScreeningTest.html";
      } catch { window.location.href = "ScreeningTest.html"; }
    }

    toggleForm.addEventListener("click", () => {
      isSignIn = !isSignIn;
      formTitle.textContent = isSignIn ? "Sign In" : "Sign Up";
      authBtn.textContent = isSignIn ? "Sign In" : "Sign Up";
      toggleForm.textContent = isSignIn ? "Don't have an account? Sign Up" : "Already have an account? Sign In";
      signinFields.style.display = isSignIn ? "block" : "none";
      signupFields.style.display = isSignIn ? "none" : "block";
    });

    authBtn.addEventListener("click", async () => {
      const password = document.getElementById("password").value.trim();
      if (isSignIn) {
        const email = document.getElementById("emailSignin").value.trim();
        if (!email || !password) { alert("Please enter email and password"); return; }
        try {
          loader.classList.add("show");
          const cred = await signInWithEmailAndPassword(auth, email, password);
          await redirectAfterLogin(cred.user);
        } catch (e) {
          loader.classList.remove("show");
          if (e.code === 'auth/invalid-credential') alert("Invalid email or password.");
          else alert("Sign-in failed: " + e.message);
        }
      } else {
        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const age = document.getElementById("ageInput").value.trim();
        const email = document.getElementById("emailSignup").value.trim();
        const nickname = document.getElementById("nickname").value.trim();
        if (!firstName || !lastName || !age || !email || !nickname || !password) {
          alert("Please fill in all fields!"); return;
        }
        try {
          loader.classList.add("show");
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(cred.user, { displayName: nickname });
          await setDoc(doc(db, "users", cred.user.uid), {
            firstName, lastName, age: Number(age), email,
            nickname, screeningComplete: false, screeningDay: 0,
            gamesPlayed: 0, accuracy: 0, streakDays: 0, totalPoints: 0,
            createdAt: new Date().toISOString()
          });
          await sendEmailVerification(cred.user);
          loader.classList.remove("show");
          alert("Verification email sent to " + email + ".\n\nPlease check your inbox and your spam folder if you don't receive it.");
          isSignIn = true; toggleForm.click();
        } catch (e) { loader.classList.remove("show"); alert("Sign-up failed: " + e.message); }
      }
    });

    const provider = new GoogleAuthProvider();
    googleBtn.addEventListener("click", async () => {
      try {
        loader.classList.add("show");
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const snap = await getDoc(doc(db, "users", user.uid));
        if (!snap.exists()) {
          await setDoc(doc(db, "users", user.uid), {
            nickname: user.displayName || user.email, email: user.email,
            screeningComplete: false, screeningDay: 0,
            gamesPlayed: 0, accuracy: 0, streakDays: 0, totalPoints: 0,
            createdAt: new Date().toISOString()
          });
        }
        await redirectAfterLogin(user);
      } catch (e) { loader.classList.remove("show"); alert("Google sign-in failed: " + e.message); }
    });

    resendBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (user) {
        try { await sendEmailVerification(user); alert("Verification email resent!\n\nPlease check your inbox and your spam folder if you don't receive it."); }
        catch (e) { alert("Error: " + e.message); }
      } else alert("Please sign in first.");
    });
  </script>
</body>
</html>
