<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiLearn — Screening Test</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        .progress-wrap {
            background: var(--border-color);
            border-radius: var(--radius-full);
            height: 12px;
            margin-bottom: 8px;
            overflow: hidden;
            width: 100%;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: var(--radius-full);
            transition: width 0.6s ease;
        }
        .progress-label {
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 24px;
        }

        .question-num {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .question-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 30px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .opt-btn {
            padding: 24px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--surface-color);
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .opt-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
        .opt-btn.correct {
            background: rgba(0, 184, 148, 0.1);
            border-color: var(--success);
            color: var(--success);
        }
        .opt-btn.wrong {
            background: rgba(255, 118, 117, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Screens */
        #dayComplete, #allDoneScreen, #alreadyDoneToday { display: none; }
        .show-flex { display: flex !important; flex-direction: column; align-items: center; text-align: center; }

        .week-dots {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .week-dot {
            width: 40px; height: 40px;
            border-radius: var(--radius-full);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: 800;
            border: 2px solid var(--border-color);
            color: var(--text-muted);
        }
        .week-dot.done {
            background: var(--success); border-color: var(--success); color: white;
        }
        .week-dot.today {
            border-color: var(--primary); color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.2);
        }
    </style>
</head>

<body>
    <div class="app-container" style="max-width: 800px; padding-top: 40px;">
        <div class="mb-4">
            <h1 class="text-primary mb-1">🧠 Brain Screening</h1>
            <p class="text-muted text-lg">7-day journey to understand how you learn best!</p>
        </div>

        <div class="week-dots" id="weekDots"></div>

        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progressLabel">Day 0 of 7</div>

        <div id="mainArea" class="surface">
            <div class="question-num" id="questionNum">Question 1 of 5</div>
            <div class="question-text" id="questionText">Loading...</div>
            <div class="options" id="optionsGrid"></div>
        </div>

        <div class="surface" id="dayComplete">
            <div style="font-size: 4rem; margin-bottom: 16px;">🌟</div>
            <h2 class="text-primary mb-2" id="dayCompleteTitle">Day 1 Done!</h2>
            <p class="text-muted mb-4" id="dayCompleteMsg">Great job! Come back tomorrow for Day 2.</p>
            <button class="btn btn-primary" id="dayContinueBtn">🏠 Go to Home</button>
        </div>

        <div class="surface" id="alreadyDoneToday">
            <div style="font-size: 4rem; margin-bottom: 16px;">⏰</div>
            <h2 class="text-primary mb-2">Come Back Tomorrow!</h2>
            <p class="text-muted mb-4">You've already completed today's screening. See you again tomorrow! 🌟</p>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">🏠 Go to Home</button>
        </div>

        <div class="surface" id="allDoneScreen">
            <div style="font-size: 4rem; margin-bottom: 16px;">🎉</div>
            <h2 class="text-primary mb-2">Screening Complete!</h2>
            <p class="text-muted mb-4" id="screeningResult"></p>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">🎮 Let's Play!</button>
        </div>
    </div>

    <script type="module">
        import { auth, db, doc, getDoc, setDoc } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const questionBank = [
            [
                { q: "Which letter is different?", opts: ["b", "b", "d", "b"], correct: 2 },
                { q: "Which letter is the same as 'p'?", opts: ["q", "b", "p", "d"], correct: 2 },
                { q: "Which one is 'm' turned upside down?", opts: ["n", "w", "u", "v"], correct: 1 },
                { q: "Which word looks correctly spelled?", opts: ["dog", "bog", "pog", "qog"], correct: 0 },
                { q: "Which letter is the odd one out?", opts: ["s", "s", "z", "s"], correct: 2 }
            ],
            [
                { q: "Which word rhymes with 'CAT'?", opts: ["Dog", "Hat", "Sun", "Cup"], correct: 1 },
                { q: "What is the first sound in 'PIG'?", opts: ["B", "P", "T", "D"], correct: 1 },
                { q: "Which word starts with the same sound as 'FISH'?", opts: ["Fan", "Boy", "Goat", "Ship"], correct: 0 },
                { q: "How many sounds in the word 'SUN'?", opts: ["1", "2", "3", "4"], correct: 2 },
                { q: "Which word ends with the 'G' sound?", opts: ["Bat", "Log", "Run", "Stop"], correct: 1 }
            ],
            [
                { q: "What color is a banana?", opts: ["Red", "Blue", "Yellow", "Green"], correct: 2 },
                { q: "Which shape has 3 sides?", opts: ["Square", "Circle", "Triangle", "Star"], correct: 2 },
                { q: "Which one is an animal?", opts: ["Table", "Apple", "Tiger", "Pencil"], correct: 2 },
                { q: "What do you use to see?", opts: ["Ears", "Eyes", "Nose", "Hands"], correct: 1 },
                { q: "Which one is a fruit?", opts: ["Car", "Orange", "Shoe", "Book"], correct: 1 }
            ],
            [
                { q: "What comes after 1, 2, 3?", opts: ["5", "6", "4", "7"], correct: 2 },
                { q: "Which letter comes next: A, B, C, __?", opts: ["E", "D", "F", "G"], correct: 1 },
                { q: "Repeat the pattern: Red, Blue, Red, __", opts: ["Green", "Yellow", "Blue", "Pink"], correct: 2 },
                { q: "What was at the start: Apple, Ball, Cat?", opts: ["Ball", "Cat", "Apple", "Dog"], correct: 2 },
                { q: "Which number is missing: 5, 6, _, 8?", opts: ["4", "7", "9", "10"], correct: 1 }
            ],
            [
                { q: "Which word is 'WAS' backwards?", opts: ["SAW", "LAW", "RAW", "WAR"], correct: 0 },
                { q: "Is 'NO' different from 'ON'?", opts: ["Yes", "No", "Maybe", "Same"], correct: 0 },
                { q: "Which one is spelled right?", opts: ["hte", "the", "eth", "teh"], correct: 1 },
                { q: "Which word has 'b' in it?", opts: ["Dad", "Bed", "Pen", "Cup"], correct: 1 },
                { q: "Find the word with 'p':", opts: ["Bag", "Hat", "Pot", "Sun"], correct: 2 }
            ],
            [
                { q: "How many claps in 'APPLE'?", opts: ["1", "2", "3", "4"], correct: 1 },
                { q: "How many claps in 'ELEPHANT'?", opts: ["2", "3", "4", "5"], correct: 1 },
                { q: "How many claps in 'CAT'?", opts: ["1", "2", "3", "0"], correct: 0 },
                { q: "Which word is longer?", opts: ["Ant", "Butterfly", "Bee", "Fly"], correct: 1 },
                { q: "Break it apart: COW-BOY makes?", opts: ["Cow", "Boy", "Cowboy", "Farm"], correct: 2 }
            ],
            [
                { q: "Which letter is the mirror of 'b'?", opts: ["p", "q", "d", "n"], correct: 2 },
                { q: "Which letter is 'u' upside down?", opts: ["n", "m", "w", "v"], correct: 0 },
                { q: "Does 'BAT' rhyme with 'HAT'?", opts: ["Yes", "No", "Maybe", "I don't know"], correct: 0 },
                { q: "What is the first letter of 'SUN'?", opts: ["C", "T", "S", "M"], correct: 2 },
                { q: "Are 'b' and 'd' the same?", opts: ["Yes", "No", "Sometimes", "Maybe"], correct: 1 }
            ]
        ];

        let currentUser = null;
        let screeningDay = 0; let qIndex = 0; let wrongCount = 0; let answered = false;

        const mainArea = document.getElementById("mainArea");
        const optionsGrid = document.getElementById("optionsGrid");

        function buildWeekDots(doneCount, todayIdx) {
            const w = document.getElementById("weekDots"); w.innerHTML = "";
            for (let i = 0; i < 7; i++) {
                const d = document.createElement("div");
                if (i < doneCount) { d.className = "week-dot done"; d.textContent = "✓"; }
                else if (i === todayIdx) { d.className = "week-dot today"; d.textContent = i + 1; }
                else { d.className = "week-dot"; d.textContent = i + 1; }
                w.appendChild(d);
            }
        }

        function updateProgress(dayNum) {
            document.getElementById("progressBar").style.width = ((dayNum / 7) * 100) + "%";
            document.getElementById("progressLabel").textContent = `Day ${dayNum} of 7 complete`;
        }

        function loadQuestion() {
            const questions = questionBank[screeningDay];
            const q = questions[qIndex];
            document.getElementById("questionNum").textContent = `Question ${qIndex + 1} of ${questions.length}`;
            document.getElementById("questionText").textContent = q.q;

            optionsGrid.innerHTML = "";
            q.opts.forEach((opt, i) => {
                const btn = document.createElement("button"); btn.className = "opt-btn"; btn.textContent = opt;
                btn.addEventListener("click", () => handleAnswer(i, q.correct, btn));
                optionsGrid.appendChild(btn);
            });
            answered = false;
        }

        function handleAnswer(chosen, correct, clickedBtn) {
            if (answered) return; answered = true;
            const allBtns = optionsGrid.querySelectorAll(".opt-btn");
            allBtns.forEach(b => b.disabled = true);

            if (chosen === correct) clickedBtn.classList.add("correct");
            else { clickedBtn.classList.add("wrong"); allBtns[correct].classList.add("correct"); wrongCount++; }

            setTimeout(() => {
                qIndex++;
                if (qIndex < questionBank[screeningDay].length) loadQuestion();
                else finishDay();
            }, 900);
        }

        async function finishDay() {
            const dayNum = screeningDay + 1;
            const updates = { screeningDay: dayNum, [`screeningWrong_day${dayNum}`]: wrongCount, [`screeningDone_day${dayNum}`]: new Date().toDateString() };

            if (dayNum === 7) {
                const snap = await getDoc(doc(db, "users", currentUser.uid));
                let totalWrong = wrongCount;
                if (snap.exists()) { const d = snap.data(); for (let i = 1; i < 7; i++) totalWrong += (d[`screeningWrong_day${i}`] || 0); }
                const hasDyslexia = totalWrong >= 12;
                updates.screeningComplete = true; updates.hasDyslexia = hasDyslexia;
                await setDoc(doc(db, "users", currentUser.uid), updates, { merge: true });
                showAllDone(hasDyslexia);
            } else {
                await setDoc(doc(db, "users", currentUser.uid), updates, { merge: true });
                showDayComplete(dayNum);
            }
        }

        function showDayComplete(dayNum) {
            mainArea.style.display = "none";
            document.getElementById("dayComplete").classList.add("show-flex");
            document.getElementById("dayCompleteTitle").textContent = dayNum === 7 ? "🎉 All 7 Days Done!" : `🌟 Day ${dayNum} Complete!`;
            document.getElementById("dayCompleteMsg").textContent = dayNum < 7 ? `Fantastic! Come back tomorrow for Day ${dayNum + 1}.` : `You finished all 7 days!`;
            buildWeekDots(dayNum, dayNum); updateProgress(dayNum);
            document.getElementById("dayContinueBtn").onclick = () => { window.location.href = "index.html"; };
        }

        function showAllDone(hasDyslexia) {
            mainArea.style.display = "none";
            document.getElementById("allDoneScreen").classList.add("show-flex");
            buildWeekDots(7, 7); updateProgress(7);
            document.getElementById("screeningResult").textContent = hasDyslexia
                ? "We've tailored some special games and exercises to help you shine! 🌟 Ready to play?"
                : "Your learning profile looks great! Let's explore all the fun games. 🎮";
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }
            currentUser = user;
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists() && snap.data().screeningComplete) { window.location.href = "index.html"; return; }
            const data = snap.exists() ? snap.data() : {};
            screeningDay = data.screeningDay || 0;
            if (screeningDay >= 7) { showAllDone(data.hasDyslexia); return; }
            
            updateProgress(screeningDay); buildWeekDots(screeningDay, screeningDay);

            if (data[`screeningDone_day${screeningDay}`] === new Date().toDateString()) {
                mainArea.style.display = "none";
                document.getElementById("alreadyDoneToday").classList.add("show-flex");
                return;
            }

            wrongCount = 0; qIndex = 0; loadQuestion();
        });
    </script>
</body>
</html>
